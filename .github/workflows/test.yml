name: Test and Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v \
            --cov=eks_health_check \
            --cov=vault_rotation \
            --cov=incident_triage \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          file: coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install flake8 black pylint

      - name: Flake8
        run: |
          flake8 eks_health_check/ vault_rotation/ incident_triage/ \
            --max-line-length=120 \
            --ignore=E501,W503,E203

      - name: Black format check
        run: |
          black --check eks_health_check/ vault_rotation/ incident_triage/ \
            || echo "Format issues found — run 'make format'"

      - name: Smoke test — all CLI --help flags
        run: |
          pip install -e . --quiet
          python -m eks_health_check.main --help
          python -m vault_rotation.main --help
          python -m incident_triage.main --help

      - name: Smoke test — incident triage dry run
        run: |
          python -m incident_triage.main \
            --payload '{"id":"TEST-001","title":"OOM kill on payment-api","environment":"production","service":"payment-api"}' \
            --dry-run
